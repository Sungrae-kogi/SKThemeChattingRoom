<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Theme Chatting Room</title>
    <!-- Google Fonts Outfit & Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.07);
            --text-primary: #ffffff;
            --text-secondary: #a0a0ab;
            --primary-gradient: linear-gradient(135deg, #e50914 0%, #ff5e3a 100%);
            --glow-color: rgba(229, 9, 20, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 고급스러운 그라데이션 배경 장식 */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--glow-color) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            right: -100px;
            z-index: 0;
            filter: blur(50px);
        }

        body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255, 94, 58, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px;
            left: -150px;
            z-index: 0;
            filter: blur(60px);
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 48px 36px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .container:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(229, 9, 20, 0.12);
        }

        .logo-area {
            margin-bottom: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* 이모티콘 대신 세련된 SVG 벡터 아이콘 */
        .logo-icon {
            width: 52px;
            height: 52px;
            fill: none;
            stroke: url(#logo-grad);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .brand-title {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .brand-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        .enter-btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            background: var(--primary-gradient);
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* 마우스 호버 시 가로지르는 하이라이트 빛 효과 */
        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: 0.6s;
        }

        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.45);
        }

        .enter-btn:hover::before {
            left: 100%;
        }

        .enter-btn:active {
            transform: translateY(1px);
        }

        .footer-text {
            margin-top: 44px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <svg class="logo-icon" viewBox="0 0 24 24">
                <defs>
                    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#e50914" />
                        <stop offset="100%" stop-color="#ff5e3a" />
                    </linearGradient>
                </defs>
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <hr>
            <svg>
                <circle cx="50" cy="50" r="40" stroke="red" stroke-width="3" fill="green"></circle>
            </svg>
        </div>
        <h1 class="brand-title">SK Theme</h1>
        <p class="brand-subtitle">실시간 대화와 유연한 소통을 위해 준비된 고유 테마의 프리미엄 채팅 서비스를 만나보세요.</p>
        <a href="/room" class="enter-btn">채팅방 입장하기</a>
        <div class="footer-text">SK Theme Chatting Room Service</div>
    </div>
</body>
</html>
